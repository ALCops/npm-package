name: "Release: npm package"

on:
  workflow_dispatch:

jobs:
  publish:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.5.0
        with:
          versionSpec: "6.x"

      - name: Determine version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.5.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Stamp version
        run: npm version "${{ steps.gitversion.outputs.majorMinorPatch }}" --no-git-tag-version

      - name: Bundle
        run: npm run bundle

      - name: Publish to npm (trusted publishing via OIDC)
        run: npm publish --provenance --access public

      - name: Create version tag
        env:
          VERSION: ${{ steps.gitversion.outputs.majorMinorPatch }}
        run: |
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "v${{ steps.gitversion.outputs.majorMinorPatch }}"
          generate_release_notes: true

      - name: Summary
        run: |
          echo "### 📦 npm Package Published" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.gitversion.outputs.majorMinorPatch }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Package:** @alcops/core" >> $GITHUB_STEP_SUMMARY
